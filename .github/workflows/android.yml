name: Build Amusic APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: gradle

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Prepare Debug Keystore
      # Prepares the signing keystore: decodes base64-encoded file if present, otherwise generates a fresh debug keystore via keytool.
      run: |
        if [ -f debug.keystore.base64 ]; then
          echo "Decoding debug.keystore.base64..."
          base64 -d debug.keystore.base64 > debug.keystore
        elif [ ! -f debug.keystore ]; then
          echo "debug.keystore.base64 not found. Dynamically generating debug.keystore via keytool..."
          keytool -genkey -v -keystore debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
        else
          echo "debug.keystore already exists."
        fi

    - name: Build Debug APK with Gradle
      run: gradle assembleDebug

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: amusic-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
